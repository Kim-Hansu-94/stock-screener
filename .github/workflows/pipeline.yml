name: Stock Screener Pipeline

on:
  schedule:
    # 07:47 KST 목표(지연 버퍼 포함) = 22:47 UTC (전날). 월~금 KST = 일~목 UTC
    # 분을 정각(0)에서 47로 옮김: GitHub Actions 스케줄 워크플로는 SLA 없는
    # best-effort 실행이며, 정각은 전 세계에서 가장 몰리는 분이라 대기열
    # 지연이 가장 크다(GitHub 공식 권장: 혼잡 회피 위해 비정각 분 사용).
    # 실측상 이 저장소는 매번 9~14시간씩 밀려 아침이 아닌 저녁/밤에
    # 실행되고 있었다. 100% 정시 보장은 안 되지만 비정각 분 + 여유 버퍼로
    # 지연 리스크를 낮췄다.
    - cron: '47 22 * * 0-4'
  workflow_dispatch:
    inputs:
      force_backfill:
        description: '기회 종목 3년 전체 재다운로드 (seed 파일 삭제)'
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Get today's date (UTC)
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore KIS price & exchange cache
        uses: actions/cache@v4
        with:
          path: |
            pipeline/.kis_price_cache.pkl
            pipeline/.kis_exch_cache.json
          key: kis-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            kis-cache-

      - name: Restore opportunity history seed marker
        uses: actions/cache@v4
        with:
          path: |
            pipeline/.yfinance_opp_seeded
            pipeline/.yfinance_opp_seeded_tickers
          key: opp-seeded-v2-${{ steps.date.outputs.date }}
          restore-keys: |
            opp-seeded-v2-

      - name: Force full backfill (seed 파일 삭제)
        if: ${{ github.event.inputs.force_backfill == 'true' }}
        run: rm -f pipeline/.yfinance_opp_seeded pipeline/.yfinance_opp_seeded_tickers

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > pipeline/.env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> pipeline/.env
          echo "KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}" >> pipeline/.env
          echo "KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}" >> pipeline/.env

      - name: Run pipeline
        working-directory: pipeline
        run: python -m src.main
