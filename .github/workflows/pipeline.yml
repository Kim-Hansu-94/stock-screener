name: Stock Screener Pipeline

on:
  schedule:
    # ⚠️ 이 schedule은 백업용이다. 본 트리거는 Supabase pg_cron이 매일
    # 07:47 KST(22:47 UTC)에 workflow_dispatch로 쏜다
    # (supabase/pg_cron_pipeline_trigger.sql 참고).
    # GitHub schedule은 SLA 없는 best-effort라 이 저장소에서 매번 9~14시간
    # 지연됐고(:47 이동으로도 개선 안 됨), 2026-07-09에는 아예 실행되지 않아
    # 아침 스크리너가 뜨지 않았다. 그래서 정시 실행은 pg_cron에 맡기고,
    # 이 schedule은 pg_cron이 실패한 날에만 늦게라도 도는 안전망으로 남긴다.
    # 중복 실행은 아래 precheck 잡이 걸러낸다.
    - cron: '47 22 * * 0-4'
  workflow_dispatch:
    inputs:
      force_backfill:
        description: '기회 종목 3년 전체 재다운로드 (seed 파일 삭제)'
        type: boolean
        default: false

jobs:
  precheck:
    # schedule 이벤트(백업 경로)일 때만 검사: 최근 18시간 내 성공한 실행이
    # 있으면 pg_cron이 이미 아침에 돌린 것이므로 중복 실행을 건너뛴다.
    # workflow_dispatch(pg_cron·수동)는 항상 통과.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          recent=$(gh run list -R "${{ github.repository }}" -w pipeline.yml \
            --status success --limit 10 --json createdAt \
            --jq "[.[] | select(.createdAt > (now - 18*3600 | todate))] | length")
          if [ "$recent" -gt 0 ]; then
            echo "최근 18시간 내 성공 실행 ${recent}건 → 백업 schedule 중복 실행 생략"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  run-pipeline:
    needs: precheck
    if: needs.precheck.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Get today's date (UTC)
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore KIS price & exchange cache
        uses: actions/cache@v4
        with:
          path: |
            pipeline/.kis_price_cache.pkl
            pipeline/.kis_exch_cache.json
          key: kis-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            kis-cache-

      - name: Restore opportunity history seed marker
        uses: actions/cache@v4
        with:
          path: |
            pipeline/.yfinance_opp_seeded
            pipeline/.yfinance_opp_seeded_tickers
          key: opp-seeded-v2-${{ steps.date.outputs.date }}
          restore-keys: |
            opp-seeded-v2-

      - name: Force full backfill (seed 파일 삭제)
        if: ${{ github.event.inputs.force_backfill == 'true' }}
        run: rm -f pipeline/.yfinance_opp_seeded pipeline/.yfinance_opp_seeded_tickers

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > pipeline/.env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> pipeline/.env
          echo "KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}" >> pipeline/.env
          echo "KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}" >> pipeline/.env

      - name: Run pipeline
        working-directory: pipeline
        run: python -m src.main
