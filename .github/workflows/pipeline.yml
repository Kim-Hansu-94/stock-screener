name: Stock Screener Pipeline

on:
  schedule:
    # ⚠️ 이 schedule들은 백업용이다. 본 트리거는 Supabase pg_cron이 매일
    # 06:30 KST(21:30 UTC)에 workflow_dispatch로 쏜다
    # (supabase/pg_cron_pipeline_trigger.sql 참고).
    # 06:30인 이유: 미장 마감(05~06시 KST, 서머타임 여부에 따라 다름) 직후이면서
    # 파이프라인 소요 50~80분을 감안해 아침 8시 확인 전에 결과가 나오는 시각.
    # 이보다 이르면(예: 새벽 3~4시) 미장이 아직 열려 있어 당일 미국 세션이 빠진다.
    # GitHub schedule은 SLA 없는 best-effort라 이 저장소에서 매번 9~14시간
    # 지연됐고(:47 이동으로도 개선 안 됨), 2026-07-09에는 아예 실행되지 않아
    # 아침 스크리너가 뜨지 않았다. 그래서 정시 실행은 pg_cron에 맡기고,
    # 백업은 pg_cron이 죽은 날(PAT 만료 등)을 대비해 06:30보다 늦은 시각에
    # 두 번(08:00 · 11:00 KST) 건다. 예전처럼 pg_cron과 같은 시각(21:30)에 걸면
    # 정상인 날 중복 실행되거나, 죽은 날 GitHub 지연으로 반나절 밀린다.
    # 중복 실행은 아래 precheck 잡이 걸러낸다.
    - cron: '0 23 * * 0-4'  # 백업 1: 08:00 KST (월~금)
    - cron: '0 2 * * 1-5'   # 백업 2: 11:00 KST (월~금)
  workflow_dispatch:
    inputs:
      force_backfill:
        description: '기회 종목 3년 전체 재다운로드 (seed 파일 삭제)'
        type: boolean
        default: false
      mode:
        description: '실행 범위 (full=전체, kr_only=한국장 마감 후 KR만 갱신)'
        type: choice
        options:
          - full
          - kr_only
        default: full

jobs:
  precheck:
    # schedule 이벤트(백업 경로)일 때만 검사: 최근 18시간 내 성공했거나
    # 지금 돌고 있는 실행이 있으면 pg_cron이 이미 처리한 것이므로 건너뛴다.
    # (08:00 KST 백업 시점엔 06:30 실행이 아직 진행 중일 수 있어
    #  in_progress/queued도 중복으로 간주한다. 자기 자신은 제외.)
    # workflow_dispatch(pg_cron·수동)는 항상 통과.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          recent=$(gh run list -R "${{ github.repository }}" -w pipeline.yml \
            --limit 20 --json databaseId,createdAt,status,conclusion \
            --jq "[.[] | select(.databaseId != $GITHUB_RUN_ID)
                       | select(.createdAt > (now - 18*3600 | todate))
                       | select(.conclusion == \"success\" or .status == \"in_progress\" or .status == \"queued\")
                  ] | length")
          if [ "$recent" -gt 0 ]; then
            echo "최근 18시간 내 성공/진행 중 실행 ${recent}건 → 백업 schedule 중복 실행 생략"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  run-pipeline:
    needs: precheck
    if: needs.precheck.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Get today's date (UTC)
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore KIS price & exchange cache
        uses: actions/cache@v4
        with:
          path: |
            pipeline/.kis_price_cache.pkl
            pipeline/.kis_exch_cache.json
          key: kis-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            kis-cache-

      - name: Restore KR universe cache
        # KRX가 러너 IP를 차단한 날, 최근 성공본 유니버스로 대체하기 위한 캐시.
        # 성공한 실행만 캐시를 저장하므로(actions/cache 기본 동작) 항상 정상본이다.
        uses: actions/cache@v4
        with:
          path: pipeline/.kr_universe_cache.pkl
          key: kr-universe-${{ steps.date.outputs.date }}
          restore-keys: |
            kr-universe-

      - name: Restore opportunity history seed marker
        uses: actions/cache@v4
        with:
          path: |
            pipeline/.yfinance_opp_seeded
            pipeline/.yfinance_opp_seeded_tickers
          key: opp-seeded-v2-${{ steps.date.outputs.date }}
          restore-keys: |
            opp-seeded-v2-

      - name: Restore KR opportunity history seed marker
        uses: actions/cache@v4
        with:
          path: |
            pipeline/.kr_opp_seeded
            pipeline/.kr_opp_seeded_tickers
          key: kr-opp-seeded-v1-${{ steps.date.outputs.date }}
          restore-keys: |
            kr-opp-seeded-v1-

      - name: Force full backfill (seed 파일 삭제)
        if: ${{ github.event.inputs.force_backfill == 'true' }}
        run: rm -f pipeline/.yfinance_opp_seeded pipeline/.yfinance_opp_seeded_tickers pipeline/.kr_opp_seeded pipeline/.kr_opp_seeded_tickers

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > pipeline/.env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> pipeline/.env
          echo "KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}" >> pipeline/.env
          echo "KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}" >> pipeline/.env

      - name: Run pipeline
        working-directory: pipeline
        # mode=kr_only(저녁 pg_cron 트리거)일 때만 --kr-only. schedule/기본은 전체 실행.
        run: python -m src.main ${{ github.event.inputs.mode == 'kr_only' && '--kr-only' || '' }}

      - name: Revalidate frontend cache
        # DB 갱신 완료 직후 사이트의 전체 캐시(screener-data 태그)를 한 번에 무효화해
        # 모든 페이지가 같은 시점의 데이터로 함께 갱신되게 한다.
        # 실패해도 파이프라인을 실패로 만들지 않는다 — cacheLife('hours')가
        # 안전망이라 최대 1시간 내 자동 갱신된다.
        env:
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          if [ -z "$REVALIDATE_URL" ]; then
            echo "::warning::REVALIDATE_URL 시크릿 미설정 → 캐시 즉시 무효화 생략 (최대 1시간 내 자동 갱신)"
            exit 0
          fi
          curl -fsS -X POST "$REVALIDATE_URL" \
            -H "Authorization: Bearer $REVALIDATE_TOKEN" \
            && echo "프론트 캐시 무효화 완료" \
            || echo "::warning::캐시 무효화 호출 실패 → cacheLife에 따라 최대 1시간 내 자동 갱신"
